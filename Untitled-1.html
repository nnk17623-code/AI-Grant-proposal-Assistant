<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Grant Proposal Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    margin: 0;
}

.container {
    width: 85%;
    margin: auto;
    padding: 20px;
}

h1 { text-align: center; }

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(45deg,#ff6a00,#ee0979);
    color: white;
    cursor: pointer;
}

.dashboard {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.chatbox {
    height: 200px;
    overflow-y: auto;
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 10px;
}

.output {
    white-space: pre-wrap;
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🚀 AI Grant Proposal Generator</h1>

<!-- Dashboard -->
<div class="card dashboard">
    <div class="box">
        <h3>Total Budget</h3>
        <p id="totalBudget">₹0</p>
    </div>
    <div class="box">
        <h3>Project Duration</h3>
        <p>6 Months</p>
    </div>
    <div class="box">
        <h3>Status</h3>
        <p>Draft</p>
    </div>
</div>

<!-- Form -->
<div class="card">
    <h3>Project Details</h3>
    <input id="title" placeholder="Project Title">
    <textarea id="idea" placeholder="Project Idea"></textarea>
    <input id="researcher" placeholder="Researcher Expertise">
</div>

<!-- Budget Input -->
<div class="card">
    <h3>💰 Budget Planner</h3>
    <input id="equip" type="number" placeholder="Equipment Cost">
    <input id="personnel" type="number" placeholder="Personnel Cost">
    <input id="misc" type="number" placeholder="Misc Cost">
    <button onclick="calculateBudget()">Calculate Total</button>
</div>

<!-- Chatbot -->
<div class="card">
    <h3>🤖 AI Chat Assistant</h3>
    <div class="chatbox" id="chatbox"></div>
    <input id="chatInput" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
</div>

<!-- Buttons -->
<div class="card">
    <button onclick="generateProposal()">Generate Proposal</button>
    <button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- Output -->
<div class="card">
    <h3>Generated Proposal</h3>
    <div id="output" class="output"></div>
</div>

</div>

<script>

// Budget calculation
function calculateBudget(){
    let e = Number(document.getElementById("equip").value) || 0;
    let p = Number(document.getElementById("personnel").value) || 0;
    let m = Number(document.getElementById("misc").value) || 0;

    let total = e + p + m;

    document.getElementById("totalBudget").innerText = "₹" + total;
}

// Chatbot (demo AI)
function sendMessage(){
    let input = document.getElementById("chatInput").value;
    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += "<p><b>You:</b> " + input + "</p>";

    let reply = "I suggest improving your proposal clarity and aligning with funding goals.";

    if(input.toLowerCase().includes("budget")){
        reply = "Make sure your budget is realistic and justified.";
    }
    if(input.toLowerCase().includes("timeline")){
        reply = "Divide your timeline into research, development, and testing phases.";
    }

    chatbox.innerHTML += "<p><b>AI:</b> " + reply + "</p>";
    document.getElementById("chatInput").value = "";
}

// Proposal generation
function generateProposal(){
    let title = document.getElementById("title").value;
    let idea = document.getElementById("idea").value;
    let researcher = document.getElementById("researcher").value;
    let budget = document.getElementById("totalBudget").innerText;

    let proposal = `
TITLE: ${title}

ABSTRACT:
${idea}

METHODOLOGY:
Using expertise in ${researcher}

TIMELINE:
6 Months (Research → Development → Testing)

TOTAL BUDGET:
${budget}

CONCLUSION:
This project aligns with funding priorities.
`;

    document.getElementById("output").innerText = proposal;
}

// PDF
function downloadPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let text = document.getElementById("output").innerText;
    let lines = doc.splitTextToSize(text, 180);

    doc.text(lines, 10, 10);
    doc.save("proposal.pdf");
}

</script>

</body>
</html>
